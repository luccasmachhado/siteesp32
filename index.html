<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle ESP32 MQTT</title>

  <!-- Biblioteca MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
    }

    .on {
      background: #00c853;
      color: white;
    }

    .off {
      background: #d50000;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    #status {
      margin-top: 15px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Controle do LED ESP32</h1>

  <button class="on" onclick="ligarLed()">LIGAR LED</button>
  <button class="off" onclick="desligarLed()">DESLIGAR LED</button>

  <p id="status">Conectando ao MQTT...</p>
</div>

<script>
  // Configuração do broker MQTT
  const broker = "wss://broker.hivemq.com:8883/esp32-reflector";
  const topicoOn = "reflector/on";
  const topicoOff = "reflector/off"

  // Conectar ao broker
  const client = mqtt.connect(broker);

  client.on("connect", () => {
    console.log("Conectado ao MQTT!");
    document.getElementById("status").innerText = "Conectado ao MQTT";
  });

  client.on("error", (err) => {
    console.error(err);
    document.getElementById("status").innerText = "Erro na conexão MQTT";
  });

  // Funções dos botões
  function ligarLed() {
    client.publish(topicoOn);
    console.log("LED LIGADO");
  }

  function desligarLed() {
    client.publish(topicoOff);
    console.log("LED DESLIGADO");
  }
</script>

</body>
</html>
