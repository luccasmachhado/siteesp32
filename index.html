<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle ESP32 MQTT</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      background: #121212;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      text-align: center;
      background: #1e1e1e;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 15px 30px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
      transition: 0.2s;
    }

    .on {
      background: #00c853;
      color: white;
    }

    .off {
      background: #d50000;
      color: white;
    }

    button:hover {
      transform: scale(1.05);
    }

    #status {
      margin-top: 15px;
      color: #aaa;
    }
  </style>
</head>
<body>

<div class="container">

  <h1>Controle ESP32</h1>

  <button class="on" onclick="ligarLed()">
    LIGAR LED
  </button>

  <button class="off" onclick="desligarLed()">
    DESLIGAR LED
  </button>

  <p id="status">
    Conectando MQTT...
  </p>

</div>

<script>

  // =====================================
  // CONFIG MQTT
  // =====================================

  const broker =
  "wss://fff567fb3b6e42cabc200996cee91ce1.s1.eu.hivemq.cloud:8884/mqtt";

  const options = {

    clientId: "esp32-reflector",

    username: "reflector",

    password: "Reflector1",

    clean: true,

    connectTimeout: 4000
  };

  const topico = "reflector";

  // =====================================
  // CONECTAR
  // =====================================

  const client = mqtt.connect(broker, options);

  client.on("connect", () => {

    console.log("MQTT conectado!");

    document.getElementById("status").innerText =
      "MQTT conectado!";
  });

  client.on("error", (err) => {

    console.error(err);

    document.getElementById("status").innerText =
      "Erro MQTT";
  });

  // =====================================
  // FUNCOES
  // =====================================

  function ligarLed() {

    client.publish(topico, "ON");

    console.log("ON enviado");
  }

  function desligarLed() {

    client.publish(topico, "OFF");

    console.log("OFF enviado");
  }

</script>

</body>
</html>
