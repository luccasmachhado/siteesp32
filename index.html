<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>ESP32 MQTT HiveMQ</title>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body{
      background:#121212;
      color:white;
      font-family:Arial;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .box{
      text-align:center;
    }

    button{
      width:200px;
      height:60px;
      margin:10px;
      border:none;
      border-radius:10px;
      font-size:20px;
      cursor:pointer;
    }

    .on{
      background:green;
      color:white;
    }

    .off{
      background:red;
      color:white;
    }
  </style>
</head>
<body>

<div class="box">

  <h1>Controle ESP32</h1>

  <button class="on" onclick="ligar()">
    LIGAR
  </button>

  <button class="off" onclick="desligar()">
    DESLIGAR
  </button>

  <h3 id="status">
    Conectando...
  </h3>

</div>

<script>

const options = {

  connectTimeout: 4000,

  clientId:
    'web_' +
    Math.random().toString(16).substr(2, 8),

  clean: true
};

const client = mqtt.connect(
  'wss://broker.hivemq.com:8884/mqtt',
  options
);

client.on('connect', function () {

  console.log('Conectado');

  document.getElementById("status")
    .innerText = "MQTT CONECTADO";
});

client.on('error', function (err) {

  console.log(err);

  document.getElementById("status")
    .innerText = "ERRO MQTT";
});

function ligar(){

  client.publish(
    'esp32/led',
    'ON'
  );

  console.log("ON enviado");
}

function desligar(){

  client.publish(
    'esp32/led',
    'OFF'
  );

  console.log("OFF enviado");
}

</script>

</body>
</html>
